<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Slot Machine 3x3 Compact</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .machine {
    width: min(1200px, 100vw);
    min-height: 100vh;
    position: relative;
    background: #ffffff;
    padding: 24px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title-bar {
    width: min(440px, 86vw);
    height: clamp(48px, 7vw, 60px);
    background: #000000;
    color: #ffffff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 500;
  }

  .reels {
    margin-top: 22px;
    display: grid;
    grid-template-columns: repeat(3, clamp(64px, 16vw, 82px));
    grid-template-rows: repeat(3, clamp(64px, 16vw, 82px));
    gap: 10px;
  }

  .slot {
    width: clamp(64px, 16vw, 82px);
    height: clamp(64px, 16vw, 82px);
    border: 3px solid #111;
    border-radius: 4px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(32px, 7vw, 42px);
    user-select: none;
  }

  .jackpot-slot {
    background: #fff6cc;
    border-color: #d8a000;
    box-shadow: 0 0 12px #d8a000;
  }

  .start-button {
    margin-top: 18px;
    width: min(140px, 48vw);
    height: 48px;
    background: #000;
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
  }

  .start-button:hover { background: #222; }
  .start-button:active { transform: translateY(2px); }

  .jackpot-text {
    margin-top: 10px;
    text-align: center;
    font-size: clamp(24px, 5vw, 30px);
    font-weight: 900;
    color: #d8a000;
    min-height: 36px;
  }

  .copy-area {
    margin-top: 18px;
    width: min(500px, 92vw);
    text-align: center;
  }

  .current-result-label {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .current-result {
    width: 100%;
    min-height: 68px;
    border: 2px solid #111;
    border-radius: 4px;
    padding: 10px 16px;
    font-size: clamp(15px, 3.6vw, 18px);
    line-height: 1.5;
    background: #fff;
    color: #111;
    white-space: pre-line;
    display: flex;
    justify-content: center;
    align-items: center;
    word-break: keep-all;
  }

  .copy-button {
    margin-top: 10px;
    padding: 8px 18px;
    font-size: 16px;
    background: white;
    color: black;
    border: 2px solid #111;
    cursor: pointer;
  }

  .copy-button:hover { background: #eee; }

  @media (max-width: 480px) {
    body {
      align-items: flex-start;
    }

    .machine {
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .copy-area {
      margin-top: 10px;
    }
  }
</style>
</head>
<body>

<div class="machine">
  <div class="title-bar">Machine</div>

  <div class="reels">
    <div class="slot" id="slot0">7пёЏвѓЈ</div>
    <div class="slot" id="slot1">7пёЏвѓЈ</div>
    <div class="slot" id="slot2">7пёЏвѓЈ</div>
    <div class="slot" id="slot3">7пёЏвѓЈ</div>
    <div class="slot" id="slot4">7пёЏвѓЈ</div>
    <div class="slot" id="slot5">7пёЏвѓЈ</div>
    <div class="slot" id="slot6">7пёЏвѓЈ</div>
    <div class="slot" id="slot7">7пёЏвѓЈ</div>
    <div class="slot" id="slot8">7пёЏвѓЈ</div>
  </div>

  <button class="start-button" onclick="spin()">Start</button>

  <div class="jackpot-text" id="jackpotText">JACKPOT!</div>

  <div class="copy-area">
    <div class="current-result-label">кІ°кіј</div>
    <div class="current-result" id="currentResult">7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ
7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ
7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ

[мћ­нЊџ!]</div>
    <button class="copy-button" id="copyButton" onclick="copyResult()">кІ°кіј ліµм‚¬</button>
  </div>
</div>

<script>
  const symbols = ["рџЌ’", "рџ’Ћ", "7пёЏвѓЈ", "рџ’Ј"];
  let latestResultText = "7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ\n7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ\n7пёЏвѓЈ7пёЏвѓЈ7пёЏвѓЈ\n\n[мћ­нЊџ!]";

  const winningLines = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
  ];

  function randomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
  }

  function spin() {
    const slots = [];

    for (let i = 0; i < 9; i++) {
      slots[i] = randomSymbol();
      const slotElement = document.getElementById("slot" + i);
      slotElement.textContent = slots[i];
      slotElement.classList.remove("jackpot-slot");
    }

    const jackpotLines = findJackpotLines(slots);
    const isJackpot = jackpotLines.length > 0;

    if (isJackpot) {
      jackpotLines.forEach(function(line) {
        line.forEach(function(index) {
          document.getElementById("slot" + index).classList.add("jackpot-slot");
        });
      });
    }

    const row1 = slots[0] + slots[1] + slots[2];
    const row2 = slots[3] + slots[4] + slots[5];
    const row3 = slots[6] + slots[7] + slots[8];

    const jackpotText = document.getElementById("jackpotText");
    const currentResult = document.getElementById("currentResult");

    let resultLine = "кІ°кіј : " + row1 + " / " + row2 + " / " + row3;

    if (isJackpot) {
      jackpotText.textContent = "JACKPOT!";
      resultLine += " [мћ­нЊџ!]";
    } else {
      jackpotText.textContent = "";
    }

    latestResultText = `${row1}
${row2}
${row3}`;

    if (isJackpot) {
      latestResultText += "\n\n[мћ­нЊџ!]";
    }

    currentResult.textContent = latestResultText;
  }

  function findJackpotLines(slots) {
    return winningLines.filter(function(line) {
      const a = slots[line[0]];
      const b = slots[line[1]];
      const c = slots[line[2]];
      return a === b && b === c;
    });
  }

  function copyResult() {
    const copyButton = document.getElementById("copyButton");

    navigator.clipboard.writeText(latestResultText).then(function() {
      copyButton.textContent = "м™„лЈЊ";
      setTimeout(function() {
        copyButton.textContent = "кІ°кіј ліµм‚¬";
      }, 1000);
    }).catch(function() {
      alert("ліµм‚¬м—ђ м‹¤нЊЁн–€мЉµл‹€л‹¤.");
    });
  }
</script>

</body>
</html>
